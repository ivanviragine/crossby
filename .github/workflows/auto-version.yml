name: Auto Version Bump

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  version-bump:
    # Only run when the PR was actually merged
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Detect bump type
        id: detect
        env:
          COMMIT_MSG: ${{ github.event.pull_request.title }}
        run: |
          MSG="$COMMIT_MSG"
          FIRST_LINE=$(printf '%s\n' "$MSG" | head -n 1)

          if printf '%s\n' "$MSG" | grep -q 'BREAKING CHANGE'; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$FIRST_LINE" | grep -qE '^[a-z]+(\(.+\))?!:'; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$FIRST_LINE" | grep -qE '^(feat|update)(\(.+\))?:'; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$FIRST_LINE" | grep -qE '^(fix|docs|refactor|chore|style|perf|test|ci|build|revert)(\(.+\))?:'; then
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          else
            echo "bump=" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if no conventional commit
        if: steps.detect.outputs.bump == ''
        run: echo "No conventional commit prefix detected — skipping version bump."

      - name: Generate app token
        if: steps.detect.outputs.bump != ''
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        if: steps.detect.outputs.bump != ''
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v3
        if: steps.detect.outputs.bump != ''
        with:
          version: "latest"

      - name: Set up Python
        if: steps.detect.outputs.bump != ''
        run: uv python install 3.13

      - name: Install dependencies
        if: steps.detect.outputs.bump != ''
        run: uv sync --all-extras

      - name: Configure git
        if: steps.detect.outputs.bump != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        if: steps.detect.outputs.bump != ''
        run: uv run python scripts/auto_version.py ${{ steps.detect.outputs.bump }}

      - name: Push commit and tag
        if: steps.detect.outputs.bump != ''
        run: |
          git push origin HEAD:${{ github.event.pull_request.base.ref }}
          git push origin --tags
